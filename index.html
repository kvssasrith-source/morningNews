<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Digest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header id="main-header" class="glass-header">
            <div class="header-content">
                <div class="date-container" id="current-date"></div>
                <h1 class="logo">Morning Digest</h1>
                <div class="edition">India Edition</div>
            </div>
            <nav class="categories">
                <button class="category-btn active" data-category="top">Top Stories</button>
                <button class="category-btn" data-category="india">India</button>
                <button class="category-btn" data-category="world">World</button>
                <button class="category-btn" data-category="technology">Technology</button>
                <button class="category-btn" data-category="business">Business</button>
                <div class="dropdown">
                    <button class="category-btn dropdown-btn" id="states-btn">States ▾</button>
                    <div class="dropdown-content">
                        <button class="category-btn state-btn" data-category="maharashtra">Maharashtra</button>
                        <button class="category-btn state-btn" data-category="delhi">Delhi</button>
                        <button class="category-btn state-btn" data-category="karnataka">Karnataka</button>
                        <button class="category-btn state-btn" data-category="andhrapradesh">Andhra Pradesh</button>
                        <button class="category-btn state-btn" data-category="tamilnadu">Tamil Nadu</button>
                        <button class="category-btn state-btn" data-category="kerala">Kerala</button>
                        <button class="category-btn state-btn" data-category="gujarat">Gujarat</button>
                        <button class="category-btn state-btn" data-category="westbengal">West Bengal</button>
                        <button class="category-btn state-btn" data-category="telangana">Telangana</button>
                    </div>
                </div>
            </nav>
        </header>

        <main class="news-container">
            <div class="loader-container" id="loader">
                <div class="spinner"></div>
            </div>
            <div id="news-grid" class="news-grid hidden">
                <!-- News cards will be dynamically injected here -->
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Morning Digest. Your premium news digest.</p>
        </footer>
    </div>

    <script src="newsApi.js"></script>
    <script src="app.js"></script>
</body>
</html>
